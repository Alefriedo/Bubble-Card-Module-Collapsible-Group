collapsible_sub_button_groups:
  name: Collapsible Sub Button Groups
  version: 1.2.3
  creator: Alefriedo
  supported:
    - button
    - calendar
    - climate
    - cover
    - media-player
    - select
    - sub-buttons
  description: |-
    <h2>Collapsible Sub Button Menu</h2>
    <h3>Breaking Change in 1.2.0: Default action type is set to tap, action type is now choosable.</h3>
    <p>
      Turns a sub-button group into a collapsible menu. All buttons except the main button are hidden by default and reveald with a double tap. The menu can be closed by the automatically inserted close button. 
    </p> <br>
    <p>
      Configure which group to collapse via its index (0 = first group, 1 = second, etc.), and choose the main button by position (first or last) or by a custom CSS class name (e.g. "bubble-sub-button-1" or the automatically generated class by giving the button a custom name). Multiple groups can be configured as collapsible menu.
    </p> <br>
    <p>
      If a double-tap action is set to the main button, it will be removed while using this module.
    </p> <br><br>

    <p>
    Configure this module via the editor or in YAML, for example:
    </p>
    <code-block><pre>
    collapsible_sub_button_groups:
      groupsConfig:
        - groupIndex: &lt; int &gt; (required)
          actionType: &lt; tap | double_tap | hold &gt; (defaults to tap)
          mainButtonType: &lt; first | last | custom &gt; (defaults to first)
          mainButtonCustomClass: &lt; string &gt; (only required if mainButtonType is set to class name)
      styling:
        backgroundColor: &lt; color | hexcode | rgba &gt;
        allowOverflow: &lt; true | false &gt; (defaults to false)
    </pre></code-block>
  code: |-
    .bubble-button-card:has(.collapsible).collapsible-allow-overflow {
      overflow: visible !important;
    }

    .bubble-container:has(.collapsible).collapsible-allow-overflow {
      overflow: visible !important;
    }
        
    .bubble-container:has(.collapsible) .bubble-sub-button-group {
      display: flex !important;
      min-height: auto !important;
    }

    .bubble-sub-button-group.collapsible.expanded {
      min-height: var(--bubble-sub-button-height, 36px) !important;
    }


    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible .collapsible-floating-group {
      position: relative !important;
      
      display: flex !important;
      flex-wrap: nowrap !important;
      flex-direction: row !important;
      justify-content: flex-end !important;
      align-items: space-around !important;

      min-height: var(--bubble-sub-button-height, 36px) !important;

      background-color: none !important;
      border-radius: 9999px !important;

      z-index: 97 !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible.expanded .collapsible-floating-group{
      position: absolute !important;
      background-color: var(--collapsible-background-color, #1c1c1c) !important;  width: max-content !important;
      
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible .collapsible-floating-group .collapsible-button-container {
      position: relative !important;
      display: flex !important;
      flex-direction: row !important;
      gap: 8px !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible .collapsible-floating-group .collapsible-button-container .bubble-sub-button:not(.collapsible-main-btn) {
      position: absolute !important;
      opacity: 0 !important;
      flex-shrink: 1 !important;
      transition: none !important;
      pointer-events: none !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible.expanded .collapsible-floating-group .collapsible-button-container .bubble-sub-button {
      padding: 0 !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible.expanded .collapsible-floating-group .collapsible-button-container .bubble-sub-button:not(.collapsible-main-btn) {
      position: relative !important;
      opacity: 1 !important;
      flex-shrink: 0 !important;
      pointer-events: auto !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible .collapsible-floating-group .collapsible-button-container .collapsible-close-btn {
      cursor: pointer !important;
      pointer-events: auto !important;
    }

    .bubble-container:has(.collapsible) .bubble-sub-button-group.collapsible .collapsible-floating-group.sliderContainer {
      overflow: hidden !important;
    }


    ${(() => {
      const groupsConfig = this.config.collapsible_sub_button_groups?.groupsConfig ?? [];
      if (!groupsConfig.length) return '';

      groupsConfig.forEach(groupConfig => {
        const groupIndex = groupConfig.groupIndex;
        if (groupIndex === undefined) return '';
        const groups = card.querySelectorAll('.bubble-sub-button-group');
        const group = groups[groupIndex];
        if (!group) return;

        // set custom background color globally
        const menuBackground = this.config.collapsible_sub_button_groups?.styling?.backgroundColor || null;
        if (menuBackground) {
          group.style.setProperty('--collapsible-background-color', menuBackground);
        } else {
          group.style.removeProperty('--collapsible-background-color');
        }

        // set allowence of overflow of the menu
        const allowOverflow = this.config.collapsible_sub_button_groups?.styling?.allowOverflow || null;
        if (allowOverflow) {
          card.querySelector('.bubble-container').classList.add('collapsible-allow-overflow');
          card.querySelector('.bubble-button-card').classList.add('collapsible-allow-overflow');
        }

        const actionType = groupConfig.actionType ?? 'tap';
        const mainButtonType = groupConfig.mainButtonType ?? 'first';
        const mainButtonCustomClass = (groupConfig.mainButtonCustomClass ?? '').replace(/^\./, '');
        const buttons = group.querySelectorAll('.bubble-sub-button:not(.collapsible-close-btn)');
      
        if (mainButtonType == 'first') {
          buttons[0].classList.add('collapsible-main-btn');
        } else if (mainButtonType == 'last') {
          buttons[buttons.length - 1].classList.add('collapsible-main-btn');
        } else if (mainButtonType == 'custom' && mainButtonCustomClass != '') {
          group.querySelector(`.bubble-sub-button.${mainButtonCustomClass}`)?.classList.add('collapsible-main-btn');
        } else {
          buttons[0].classList.add('collapsible-main-btn');
        }

        const mainButton = group.querySelector('.collapsible-main-btn');
        if(!mainButton) return;

        if (!card._collapsibleOriginalActions) {
          card._collapsibleOriginalActions = {};
        }

        // store default actions of main button
        if (!card._collapsibleOriginalActions[groupIndex]) {
          card._collapsibleOriginalActions[groupIndex] = {
            tap: mainButton.getAttribute('data-tap-action'),
            double_tap: mainButton.getAttribute('data-double-tap-action'),
            hold: mainButton.getAttribute('data-hold-action')
          };
        }

        // unset default actions of main button
        mainButton.setAttribute('data-tap-action', '{"action":"none"}');
        mainButton.setAttribute('data-double-tap-action', '{"action":"none"}');
        mainButton.setAttribute('data-hold-action', '{"action":"none"}');

        // setup collapsible menu
        if (!group.querySelector('.collapsible-close-btn')) {
          group.classList.add('collapsible');
          group.classList.replace('display-column', 'display-inline');

          // add floating group preventing interference with other buttons/groups
          const floatingGroup = document.createElement('div');
          floatingGroup.classList.add('collapsible-floating-group');
          group.appendChild(floatingGroup);
          const buttonContainer = document.createElement('div');
          buttonContainer.classList.add('collapsible-button-container');
          buttons.forEach(b => buttonContainer.appendChild(b));

          // insert close button
          const closeButtonElement = document.createElement('div');
          closeButtonElement.className = 'bubble-sub-button collapsible-close-btn';
          closeButtonElement.innerHTML = '<ha-icon class="bubble-sub-button-icon show-icon icon-without-state" icon="mdi:chevron-right"></ha-icon>';
          buttonContainer.insertBefore(closeButtonElement, buttonContainer.firstChild);

          floatingGroup.appendChild(buttonContainer);
        }

        if (!mainButton._collapsibleBound) {
          mainButton._collapsibleBound = true;
          
          mainButton.addEventListener('pointerdown', e => {
            // prevent capturing of clicks in bubble cards button dropdown menu
            if (e.target.closest('ha-select, ha-dropdown-item, input, select')) return;

            const group = e.target.closest('.bubble-sub-button-group');
            group._holdTimer = setTimeout(() => {
              if(actionType == 'hold' && !group.classList.contains('expanded')) {
                group.classList.add('expanded');
              } else {
                mainButton.dispatchEvent(new CustomEvent('hass-action', {
                  detail: { config: { entity: mainButton.dataset.entity, hold_action: JSON.parse(card._collapsibleOriginalActions[groupIndex].hold) }, action: 'hold' },
                  bubbles: true, composed: true
                }));
              }

              group._holdTimer = null;
            }, 500);
          }, true);

          mainButton.addEventListener('click', e => {
              // prevent capturing of clicks in bubble cards button dropdown menu
              if (e.target.closest('ha-select, ha-dropdown-item, input, select')) return;

              const group = e.target.closest('.bubble-sub-button-group');
              // reset hold timer, if button not held long enough
              if(group._holdTimer) {
                clearTimeout(group._holdTimer);
                group._holdTimer = null;
              }

              // passthrough for synthetic click opening the slider or dropdown menu of a main sub button
              if (mainButton._timeoutClick) {
                mainButton._timeoutClick = false;
                return;
              }

              // if the sub button group is expanded, use default tap action
              // if (group.classList.contains('expanded')) return;

              // timeout waiting for double click to prevent the tap action firing when its actually a double click
              if (mainButton._clickTimer) {
                clearTimeout(mainButton._clickTimer);
                mainButton._clickTimer = null;
                e.stopPropagation();
                return;
              }
              
              e.stopPropagation();
              
              mainButton._clickTimer = setTimeout(() => {
                mainButton._clickTimer = null;
                
                const mainButtonIndex = [...mainButton.classList].find(c => /^bubble-sub-button-\d+$/.test(c))?.match(/\d+/)?.[0];
                const mainButtonIsSlider = mainButtonIndex && !!card.querySelector(`.bubble-sub-button-slider-${mainButtonIndex}`);
                const mainButtonHasDropdown = !!mainButton.querySelector('.bubble-dropdown-container');
                // fire synthetic click if main sub button has a slider or a dropdown menu to open them else use default tap action
                if (actionType == 'tap' && !group.classList.contains('expanded')) {
                  group.classList.add('expanded');
                } else if(mainButtonIsSlider || mainButtonHasDropdown) {
                  mainButton._timeoutClick = true;
                  mainButton.click();
                } else {
                  mainButton.dispatchEvent(new CustomEvent('hass-action', {
                    detail: { config: { entity: mainButton.dataset.entity, tap_action: JSON.parse(card._collapsibleOriginalActions[groupIndex].tap) }, action: 'tap' },
                    bubbles: true, composed: true
                  }));
                }
              }, 250);              
            }, true);
          
          mainButton.addEventListener('dblclick', (e) => {
            // prevent capturing of clicks in bubble cards button dropdown menu
            if (e.target.closest('ha-select, ha-dropdown-item, input, select')) return;

            e.stopPropagation();
            
            // reset click timer if running
            if(mainButton._clickTimer) {
              clearTimeout(mainButton._clickTimer);
              mainButton._clickTimer = null;
            }

            // fire initial double tap event if group is expanded
            const group = mainButton.closest('.bubble-sub-button-group');
            if (actionType == 'double_tap' && !group.classList.contains('expanded')) {
              group.classList.add('expanded');
            } else {
              mainButton.dispatchEvent(new CustomEvent('hass-action', {
                detail: { config: { entity: mainButton.dataset.entity, double_tap_action: JSON.parse(card._collapsibleOriginalActions[groupIndex].double_tap) }, action: 'double_tap' },
                bubbles: true, composed: true
              }));
              return;
            }
          }, true);

          // setup event listener of close button
          group.addEventListener('click', (e) => {
            const closeButton = e.target.closest('.collapsible-close-btn');
            if (!closeButton) return;
            e.preventDefault();
            group.classList.remove('expanded');
          });
        }
      });

      return ''
    })()}
  editor:
    - name: groupsConfig
      label: Collapsible Groups
      selector:
        object:
          fields:
            groupIndex:
              label: Group index
              selector:
                number:
                  min: 0
                  max: 100
                  step: 1
                  mode: box
            actionType:
              label: Action Type
              selector:
                select:
                  options:
                    - label: Tap
                      value: tap
                    - label: Double Tap
                      value: double_tap
                    - label: Hold
                      value: hold
            mainButtonType:
              label: Main Button
              selector:
                select:
                  options:
                    - label: First Button
                      value: first
                    - label: Last Button
                      value: last
                    - label: Identified by class name
                      value: custom
            mainButtonCustomClass:
              label: Class name of main button
              selector:
                text: null
          label_field: groupIndex
          description_field: mainButtonType
          multiple: true
    - type: expandable
      name: styling
      title: Styling
      icon: mdi:palette
      expanded: false
      schema:
        - name: backgroundColor
          label: color name, hex code or rgba
          selector:
            text: {}
        - name: allowOverflow
          label: Allow overflow of sub button menu outside of card
          selector:
            boolean: {}
